<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">ScopeGuard</title>
  <desc id="desc">App icon: blue gateway arch with approved checkmark</desc>

  <!-- Background -->
  <rect width="180" height="180" rx="42" fill="#2563EB"/>

  <!-- Gateway pillars -->
  <rect x="46" y="52" width="26" height="96" rx="6" fill="#FFFFFF"/>
  <rect x="108" y="52" width="26" height="96" rx="6" fill="#FFFFFF"/>

  <!-- Gateway arch -->
  <path
    d="M46 66 C46 30 134 30 134 66"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="26"
    stroke-linecap="round"
  />

  <!-- Approved check badge -->
  <circle cx="90" cy="150" r="15" fill="#93C5FD"/>
  <path
    d="M83 150 L88 155 L98 144"
    fill="none"
    stroke="#2563EB"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
